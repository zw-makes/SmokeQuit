name: SmokeQuit
options:
  bundleIdPrefix: com.smokequit
  minimumXcodeVersion: "15.0"
targets:
  SmokeQuit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SmokeQuit
    info:
      path: SmokeQuit/Info.plist
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.smokequit.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.8"
        # Force Xcode to use our custom Info.plist and NOT auto-generate one
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: "SmokeQuit/Info.plist"
        # Tell actool to compile the LaunchImage asset set
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: LaunchImage
