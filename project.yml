name: SmokeQuit
options:
  bundleIdPrefix: com.smokequit
targets:
  SmokeQuit:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - SmokeQuit
    info:
      properties:
        CFBundleDisplayName: "SmokeQuit"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSRequiresIPhoneOS: true
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.smokequit.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.8"
