name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Web Application
      run: npm run build

    - name: Sync Capacitor iOS Platform
      run: |
        npx cap sync ios

    - name: Build Xcode Project
      run: |
        xcodebuild -workspace ios/App/App.xcworkspace \
                   -scheme App \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath ios/App/build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   clean build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
        zip -r SmokeQuit.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmokeQuit-Unsigned-IPA
        path: SmokeQuit.ipa
