name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate LaunchScreen Storyboard
      run: |
        # Get exact ibtool toolsVersion from the running Xcode installation
        IBTOOL_INFO=$(xcrun ibtool --version 2>&1 || true)
        TOOLS_VER=$(echo "$IBTOOL_INFO" | python3 -c "
import sys, re
data = sys.stdin.read()
m = re.search(r'toolsVersion[^=]*=\s*(\d+)', data)
print(m.group(1) if m else '23049')
" 2>/dev/null || echo "23049")

        # Get exact IBCocoaTouchPlugin version from Xcode
        XCODE_APP=$(xcode-select -p | sed 's|/Contents/Developer||')
        PLUGIN_PLIST="$XCODE_APP/Contents/Developer/Library/Xib Compilers/IBCocoaTouchPlugin.ibplugin/Contents/Info.plist"
        PLUGIN_VER=$(python3 -c "
import plistlib, sys
try:
    with open('$PLUGIN_PLIST', 'rb') as f:
        d = plistlib.load(f)
    print(d.get('CFBundleVersion', '23034'))
except Exception as e:
    print('23034')
" 2>/dev/null || echo "23034")

        echo "Generating LaunchScreen.storyboard with toolsVersion=$TOOLS_VER, pluginVersion=$PLUGIN_VER"

        python3 -c "
tools_ver = '$TOOLS_VER'
plugin_ver = '$PLUGIN_VER'
content = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
<document type=\"com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB\" version=\"3.0\" toolsVersion=\"''' + tools_ver + '''\" targetRuntime=\"AppleCocoa\" propertyAccessControl=\"none\" useAutolayout=\"YES\" launchScreen=\"YES\" useTraitCollections=\"YES\" useSafeAreas=\"YES\" colorMatched=\"YES\" initialViewController=\"01J-lp-oVM\">
    <device id=\"retina6_12\" orientation=\"portrait\" appearance=\"light\"/>
    <dependencies>
        <deployment identifier=\"iOS\"/>
        <plugIn identifier=\"com.apple.InterfaceBuilder.IBCocoaTouchPlugin\" version=\"''' + plugin_ver + '''\"/>
        <capability name=\"Safe area layout guides\" minToolsVersion=\"9.0\"/>
        <capability name=\"documents saved in the Xcode 8 format\" minToolsVersion=\"8.0\"/>
    </dependencies>
    <scenes>
        <scene sceneID=\"EHf-IW-A2E\">
            <objects>
                <viewController id=\"01J-lp-oVM\" sceneMemberID=\"viewController\">
                    <view key=\"view\" contentMode=\"scaleToFill\" id=\"Ze5-6b-2t3\">
                        <rect key=\"frame\" x=\"0.0\" y=\"0.0\" width=\"393\" height=\"852\"/>
                        <autoresizingMask key=\"autoresizingMask\" widthSizable=\"YES\" heightSizable=\"YES\"/>
                        <color key=\"backgroundColor\" red=\"0.051\" green=\"0.082\" blue=\"0.161\" alpha=\"1\" colorSpace=\"custom\" customColorSpace=\"sRGB\"/>
                    </view>
                </viewController>
                <placeholder placeholderIdentifier=\"IBFirstResponder\" id=\"iYj-Kq-Ea1\" userLabel=\"First Responder\" sceneMemberID=\"firstResponder\"/>
            </objects>
            <point key=\"canvasLocation\" x=\"53\" y=\"375\"/>
        </scene>
    </scenes>
</document>'''
with open('SmokeQuit/LaunchScreen.storyboard', 'w', encoding='utf-8') as f:
    f.write(content)
print('LaunchScreen.storyboard written successfully')
"

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Application
      run: |
        xcodebuild -project SmokeQuit.xcodeproj \
                   -scheme SmokeQuit \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   clean build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/SmokeQuit.app Payload/
        zip -r SmokeQuit.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmokeQuit-Unsigned-IPA
        path: SmokeQuit.ipa
