name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Application
      run: |
        xcodebuild -project SmokeQuit.xcodeproj \
                   -scheme SmokeQuit \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   clean build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/SmokeQuit.app Payload/
        zip -r SmokeQuit.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmokeQuit-Unsigned-IPA
        path: SmokeQuit.ipa
