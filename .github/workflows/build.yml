name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate PNG Launch Images
      run: python3 scripts/generate_launch_images.py

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Application
      run: |
        xcodebuild -project SmokeQuit.xcodeproj \
                   -scheme SmokeQuit \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath build \
                   ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME=LaunchImage \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   clean build

    - name: Verify compiled Info.plist
      run: |
        APP_PATH="build/Build/Products/Release-iphoneos/SmokeQuit.app"
        echo "=== Compiled Info.plist contents ==="
        plutil -p "$APP_PATH/Info.plist" | grep -E "UILaunch|UIRequires|CFBundle" || true
        echo "=== Launch screen files in bundle ==="
        ls "$APP_PATH/" | grep -i launch || echo "No launch files found"

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/SmokeQuit.app Payload/
        zip -r SmokeQuit.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmokeQuit-Unsigned-IPA
        path: SmokeQuit.ipa
